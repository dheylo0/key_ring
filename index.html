<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen NFC</title>
    <style>
        /* Elimina márgenes y pone el fondo negro */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita scroll */
        }

        /* Hace que la imagen sea responsiva y ocupe el máximo posible */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Mantiene la proporción sin deformar */
        }
    </style>
</head>
<body>
    <img src="TU_URL_DE_IMAGEN_AQUÍ" alt="Foto">
</body>
</html>
